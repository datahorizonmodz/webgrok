<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATZON Pro V5 - Tracking System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); }
        .active-tab { background: #3b82f6; color: white; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
        .locked { border-color: #ef4444 !important; color: #ef4444 !important; }
    </style>
</head>
<body class="text-slate-200 min-h-screen p-4 flex flex-col items-center">

    <div class="w-full max-w-md space-y-6 mt-6 pb-20">
        <!-- Brand Header -->
        <div class="text-center">
            <h1 class="text-4xl font-black tracking-tighter text-white uppercase italic">Datzon<span class="text-blue-500 not-italic ml-1 text-sm">V5</span></h1>
            <div id="connStatus" class="inline-flex items-center space-x-2 mt-2 px-3 py-1 bg-slate-900 rounded-full border border-slate-800">
                <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Menghubungkan...</span>
            </div>
        </div>

        <!-- Tab Switcher -->
        <div class="flex p-1.5 bg-slate-900/80 rounded-2xl border border-slate-800">
            <button onclick="setTab('gen')" id="tGen" class="flex-1 py-3 rounded-xl text-[11px] font-bold active-tab transition-all uppercase">Generator</button>
            <button onclick="setTab('history')" id="tHistory" class="flex-1 py-3 rounded-xl text-[11px] font-bold text-slate-500 transition-all uppercase tracking-widest">Riwayat</button>
            <button onclick="setTab('admin')" id="tAdmin" class="flex-1 py-3 rounded-xl text-[11px] font-bold text-slate-500 transition-all uppercase">Sync</button>
        </div>

        <!-- TAB: GENERATOR -->
        <div id="viewGen" class="space-y-6 animate-in fade-in duration-500">
            <div class="glass p-6 rounded-[2.5rem] shadow-2xl space-y-6 relative overflow-hidden">
                <div id="limitIndicator" class="hidden absolute top-0 left-0 w-full bg-red-600/20 text-red-500 text-[9px] font-bold py-1 text-center uppercase tracking-widest">Limit Akun Tercapai!</div>
                
                <div class="pt-2">
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-3 text-center tracking-widest">Input Nomor Akun</label>
                    <input type="number" id="accNum" placeholder="---" 
                        class="w-full bg-slate-950 border border-slate-800 rounded-3xl p-5 outline-none text-5xl text-center font-black text-blue-500 focus:border-blue-600 transition-all">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="changeType('PRIVATE')" id="pBtn" class="py-4 rounded-2xl font-bold text-xs border-2 border-blue-600 bg-blue-600/10 text-blue-400">PRIVATE</button>
                    <button onclick="changeType('SHARING')" id="sBtn" class="py-4 rounded-2xl font-bold text-xs border-2 border-transparent bg-slate-900 text-slate-500">SHARING</button>
                </div>

                <button onclick="handleFetchClick()" id="fetchBtn"
                    class="w-full btn-primary p-5 rounded-3xl font-bold text-white active:scale-95 transition-all shadow-xl shadow-blue-900/20 uppercase tracking-wider">
                    Dapatkan Data
                </button>
            </div>

            <!-- Preview Result -->
            <div id="resBox" class="hidden glass p-6 rounded-[2.5rem] space-y-4 border-blue-500/20">
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-bold text-blue-500 uppercase">Hasil Generate:</span>
                    <button onclick="copyToClipboard()" class="bg-blue-600 text-[10px] px-5 py-2 rounded-full font-bold">SALIN</button>
                </div>
                <div id="resText" class="text-[11px] font-mono text-slate-300 whitespace-pre-wrap leading-relaxed bg-black/50 p-5 rounded-2xl border border-white/5 overflow-x-auto"></div>
            </div>
        </div>

        <!-- TAB: RIWAYAT (DROPDOWN LIST) -->
        <div id="viewHistory" class="hidden space-y-4 animate-in fade-in duration-300">
            <div class="space-y-3" id="historyContainer">
                <!-- Dropdown item example -->
                <div class="text-center py-10 text-slate-600 text-xs italic">Memuat riwayat penggunaan...</div>
            </div>
        </div>

        <!-- TAB: BULK UPLOAD -->
        <div id="viewAdmin" class="hidden space-y-6">
            <div class="glass p-6 rounded-[2.5rem] space-y-4">
                <textarea id="bulkText" rows="12" placeholder="Paste data akun (88. email | link)..." 
                    class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 text-[10px] font-mono outline-none h-64 focus:border-blue-500 text-blue-200"></textarea>

                <button onclick="bulkUploadBatch()" id="uploadBtn"
                    class="w-full bg-white text-black p-5 rounded-3xl font-bold hover:bg-slate-200 transition-all uppercase">
                    Sync Database Cloud
                </button>
            </div>
        </div>

        <!-- MODAL: SECURITY OVERRIDE -->
        <div id="securityModal" class="fixed inset-0 bg-black/90 backdrop-blur-md z-[100] hidden flex items-center justify-center p-6">
            <div class="glass w-full max-w-sm p-8 rounded-[3rem] border-red-500/30 text-center space-y-6">
                <div class="w-16 h-16 bg-red-500/20 rounded-full flex items-center justify-center mx-auto">
                    <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
                <div class="space-y-2">
                    <h2 class="text-xl font-bold text-white uppercase tracking-tighter">Security Override</h2>
                    <p class="text-[10px] text-slate-500 uppercase tracking-widest">Masukkan password untuk generate ulang akun ini</p>
                </div>
                
                <input type="password" id="forcePass" placeholder="Masukkan Password" 
                    class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 outline-none text-center font-bold focus:border-red-600 transition-all">
                
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="closeSecurityModal()" class="bg-slate-800 p-4 rounded-2xl text-[10px] font-bold uppercase">Batal</button>
                    <button onclick="confirmForceGenerate()" class="bg-red-600 p-4 rounded-2xl text-[10px] font-bold uppercase text-white">Generate Paksa</button>
                </div>
            </div>
        </div>

        <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-full text-xs font-bold shadow-2xl hidden z-50"></div>
        
        <footer class="text-center text-slate-700 text-[9px] tracking-[0.5em] uppercase py-8 font-bold">
            Datzon Automation &copy; 2024
        </footer>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, writeBatch, onSnapshot, collection, query } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDI4w8gIPE_kqGrKOSpcz84xUHDirwWqcw",
            authDomain: "datzonweb.firebaseapp.com",
            projectId: "datzonweb",
            storageBucket: "datzonweb.firebasestorage.app",
            messagingSenderId: "357601269435",
            appId: "1:357601269435:web:fe993d66e4b7d6c9ba7b9e",
            measurementId: "G-V4KQ5QJKVN"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = "am-generator-datzon"; 

        let user = null;
        let type = 'PRIVATE';
        let forceClickCount = 0;
        let lastTargetId = '';

        onAuthStateChanged(auth, (u) => {
            const status = document.getElementById('connStatus');
            if (u) {
                user = u;
                status.innerHTML = '<div class="w-2 h-2 rounded-full bg-green-500"></div><span class="text-[10px] font-bold text-green-500 uppercase tracking-widest">Server Online</span>';
                listenToHistory();
            } else {
                signInAnonymously(auth);
            }
        });

        // Tab Handler
        window.setTab = (t) => {
            const tabs = ['viewGen', 'viewAdmin', 'viewHistory'];
            tabs.forEach(tab => document.getElementById(tab).classList.add('hidden'));
            document.getElementById('view' + t.charAt(0).toUpperCase() + t.slice(1)).classList.remove('hidden');
            
            document.getElementById('tGen').className = t === 'gen' ? 'flex-1 py-3 rounded-xl text-[11px] font-bold active-tab transition-all' : 'flex-1 py-3 rounded-xl text-[11px] font-bold text-slate-500 transition-all';
            document.getElementById('tHistory').className = t === 'history' ? 'flex-1 py-3 rounded-xl text-[11px] font-bold active-tab transition-all' : 'flex-1 py-3 rounded-xl text-[11px] font-bold text-slate-500 transition-all';
            document.getElementById('tAdmin').className = t === 'admin' ? 'flex-1 py-3 rounded-xl text-[11px] font-bold active-tab transition-all' : 'flex-1 py-3 rounded-xl text-[11px] font-bold text-slate-500 transition-all';
        };

        window.changeType = (t) => {
            type = t;
            document.getElementById('pBtn').className = t === 'PRIVATE' ? 'py-4 rounded-2xl font-bold text-xs border-2 border-blue-600 bg-blue-600/10 text-blue-400' : 'py-4 rounded-2xl font-bold text-xs border-2 border-transparent bg-slate-900 text-slate-500';
            document.getElementById('sBtn').className = t === 'SHARING' ? 'py-4 rounded-2xl font-bold text-xs border-2 border-purple-600 bg-purple-600/10 text-purple-400' : 'py-4 rounded-2xl font-bold text-xs border-2 border-transparent bg-slate-900 text-slate-500';
        };

        // Logic Fetching & Locking
        window.handleFetchClick = async () => {
            const num = document.getElementById('accNum').value;
            if(!num) return notify("Input nomor akun!", "red");

            // Reset counter jika ganti nomor
            if(lastTargetId !== num) {
                forceClickCount = 0;
                lastTargetId = num;
            }

            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'accounts', num);
            const snap = await getDoc(docRef);

            if(!snap.exists()) return notify("Akun belum terdaftar!", "red");

            const data = snap.data();
            const count = data.genCount || 0;
            const currentAccType = type; // Type yang dipilih di UI

            // Aturan Limit
            let isLimit = false;
            if(currentAccType === 'PRIVATE' && count >= 1) isLimit = true;
            if(currentAccType === 'SHARING' && count >= 3) isLimit = true;

            if(isLimit) {
                forceClickCount++;
                document.getElementById('accNum').classList.add('locked');
                document.getElementById('limitIndicator').classList.remove('hidden');

                if(forceClickCount >= 3) {
                    openSecurityModal();
                } else {
                    notify(`Limit Tercapai! (${3 - forceClickCount}x lagi untuk paksa)`, "red");
                }
                return;
            }

            // Jika Belum Limit, Langsung Generate
            executeGenerate(num, data.email, data.link, count);
        };

        async function executeGenerate(num, email, link, currentCount) {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'accounts', num);
            
            try {
                await updateDoc(docRef, {
                    genCount: currentCount + 1,
                    lastType: type,
                    lastGenerated: new Date().toISOString()
                });

                renderTemplate(email, link);
                notify(`Berhasil Generate Akun #${num}`);
                resetForceCounter();
            } catch (e) {
                notify("Koneksi Database Error", "red");
            }
        }

        // Security Modal Handling
        window.openSecurityModal = () => document.getElementById('securityModal').classList.remove('hidden');
        window.closeSecurityModal = () => {
            document.getElementById('securityModal').classList.add('hidden');
            resetForceCounter();
        };

        window.confirmForceGenerate = async () => {
            const pass = document.getElementById('forcePass').value;
            const num = document.getElementById('accNum').value;

            if(pass !== 'paksa') return notify("Password Salah!", "red");

            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'accounts', num);
            const snap = await getDoc(docRef);
            const data = snap.data();

            // Paksa generate: Reset count jadi 1 dan set type baru
            await updateDoc(docRef, {
                genCount: 1, 
                lastType: type,
                lastGenerated: new Date().toISOString(),
                forced: true
            });

            renderTemplate(data.email, data.link);
            closeSecurityModal();
            notify("Generate Paksa Sukses!");
        };

        function resetForceCounter() {
            forceClickCount = 0;
            document.getElementById('accNum').classList.remove('locked');
            document.getElementById('limitIndicator').classList.add('hidden');
            document.getElementById('forcePass').value = "";
        }

        // History System (Realtime Listener)
        function listenToHistory() {
            // Fetch all docs to filter in JS (as per Rule 2)
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'accounts'));
            
            onSnapshot(q, (snap) => {
                const container = document.getElementById('historyContainer');
                container.innerHTML = "";
                
                // Ambil yang pernah di generate (genCount > 0)
                const items = [];
                snap.forEach(doc => {
                    if(doc.data().genCount > 0) items.push({ id: doc.id, ...doc.data() });
                });

                // Urutkan berdasarkan waktu generate terbaru
                items.sort((a, b) => new Date(b.lastGenerated) - new Date(a.lastGenerated));

                if(items.length === 0) {
                    container.innerHTML = `<div class="text-center py-20 text-slate-700 uppercase tracking-widest text-[10px]">Belum Ada Riwayat</div>`;
                    return;
                }

                items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "glass p-4 rounded-2xl border-white/5";
                    
                    const time = new Date(item.lastGenerated).toLocaleString('id-ID', { hour:'2-digit', minute:'2-digit' });
                    const isFull = (item.lastType === 'PRIVATE' && item.genCount >= 1) || (item.lastType === 'SHARING' && item.genCount >= 3);

                    div.innerHTML = `
                        <details class="group">
                            <summary class="flex justify-between items-center cursor-pointer list-none">
                                <div class="flex items-center space-x-3">
                                    <div class="w-10 h-10 rounded-xl bg-slate-900 flex items-center justify-center font-bold text-blue-500 border border-white/5">#${item.id}</div>
                                    <div>
                                        <p class="text-[11px] font-bold text-white uppercase">${item.lastType}</p>
                                        <p class="text-[9px] text-slate-500">${time} • Terpakai: ${item.genCount}x</p>
                                    </div>
                                </div>
                                <div class="flex items-center space-x-2">
                                    <span class="text-[8px] font-bold px-2 py-0.5 rounded-full ${isFull ? 'bg-red-500/10 text-red-500' : 'bg-green-500/10 text-green-500'} uppercase">${isFull ? 'Full' : 'Available'}</span>
                                    <svg class="w-4 h-4 text-slate-600 group-open:rotate-180 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"></path></svg>
                                </div>
                            </summary>
                            <div class="mt-4 pt-4 border-t border-white/5 text-[10px] space-y-2">
                                <div class="flex justify-between"><span class="text-slate-500">Email:</span> <span class="text-blue-300 font-mono">${item.email}</span></div>
                                <div class="flex justify-between"><span class="text-slate-500">Status:</span> <span class="text-slate-300">${item.forced ? 'GENERATED PAKSA (RE-TYPE)' : 'Normal Usage'}</span></div>
                                <button onclick="reCopy('${item.id}')" class="w-full mt-2 bg-slate-800 py-2 rounded-lg font-bold uppercase tracking-widest text-slate-400 active:bg-blue-600 active:text-white transition-colors">Salin Ulang Data</button>
                            </div>
                        </details>
                    `;
                    container.appendChild(div);
                });
            }, (err) => console.error("History Listener Error:", err));
        }

        window.reCopy = async (id) => {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'accounts', id);
            const snap = await getDoc(docRef);
            if(snap.exists()){
                renderTemplate(snap.data().email, snap.data().link);
                copyToClipboard();
                notify("Berhasil Salin Ulang!");
            }
        };

        // Bulk Upload with Syncing genCount:0
        window.bulkUploadBatch = async () => {
            const raw = document.getElementById('bulkText').value;
            if(!raw) return notify("Input data kosong!", "red");
            
            const btn = document.getElementById('uploadBtn');
            const lines = raw.split('\n');
            const batch = writeBatch(db);
            let count = 0;

            btn.disabled = true;
            btn.innerText = "SYNCING CLOUD...";

            for(let line of lines) {
                const match = line.match(/(\d+)\.\s*([^| ]+)\s*\|\s*(\S+)/);
                if(match) {
                    const no = match[1];
                    const ref = doc(db, 'artifacts', appId, 'public', 'data', 'accounts', no);
                    // Gunakan set merge agar tidak menghapus genCount jika sudah ada
                    batch.set(ref, {
                        email: match[2],
                        link: match[3],
                        genCount: 0, // Default 0 jika baru
                        lastType: 'PENDING'
                    }, { merge: true });
                    count++;
                }
            }

            try {
                await batch.commit();
                notify(`Sync Selesai: ${count} Akun ✅`);
            } catch (e) {
                notify("Sync Gagal!", "red");
            } finally {
                btn.disabled = false;
                btn.innerText = "Sync Database Cloud";
            }
        };

        function renderTemplate(email, link) {
            const tpl = `ALIGHT MOTION 1 TAHUN ${type}

𝗗𝗔𝗧𝗔 𝗔𝗞𝗨𝗡
📧 : ${email} | AKSES BUKA ${link}

• Pembelian 1 tahun garansi selama 6 bulan.

🏷 Harap Ikuti Tutorial login Terlebih Dahulu :
1. buka aplikasi alight motion, pastikan sudah update versi terbaru Play Store.
2. login menggunakan email biasa warna merah. jangan klik lewat google.
3. tempel email yang dikasih oleh seller -> klik berikutnya.
4. nah akan memerlukan link verifikasi loginnya ya
5. verifikasinya klik link AKSES BUKA email di atas yang sudah disediakan (acc seller).
6. scroll ke bawah sampai ada pesan "noreply@" warna biru/higau klik pesan paling atas scrol ke bawah lagi cari pesan "login to alight motion" atau "masuk ke alight motion" KLIK "Login ke Alight Creative". DONE PREMIUM ✅
7. tutorial jika masih belum paham : https://vt.tiktok.com/ZSadM8pQh/`;

            document.getElementById('resText').innerText = tpl;
            document.getElementById('resBox').classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        window.copyToClipboard = () => {
            const text = document.getElementById('resText').innerText;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            notify("Data Berhasil Disalin!");
        };

        function notify(msg, type = "blue") {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = `fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-full text-xs font-bold shadow-2xl z-50 animate-bounce ${type === 'red' ? 'bg-red-600 text-white' : 'bg-white text-black'}`;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 2500);
        }
    </script>
</body>
</html>

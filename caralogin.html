<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DATZON - Premium Guide</title>
    
    <!-- FONT UPDATE: Quicksand -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* Core Variables & Setup */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.7);
            --glass-highlight: rgba(255, 255, 255, 0.9);
            --glass-shadow: rgba(0, 0, 0, 0.04);
            --text-primary: #0f172a; 
            --text-secondary: #475569; 
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        body {
            margin: 0;
            min-height: 100vh;
            background-color: #f8fafc;
            font-family: 'Quicksand', sans-serif;
            color: var(--text-primary);
            overflow-x: hidden;
            overscroll-behavior-y: none; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: transparent;
        }

        /* Abstract Liquid Background */
        .bg-container {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background: linear-gradient(135deg, #f0fdfa 0%, #e0f2fe 50%, #f8fafc 100%);
            overflow: hidden;
        }

        .bg-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.8;
            will-change: transform;
        }

        .shape1 { top: -10%; left: -10%; width: 60vw; height: 60vw; background: #bae6fd; animation: liquidFloat 18s ease-in-out infinite alternate; }
        .shape2 { bottom: -20%; right: -10%; width: 70vw; height: 70vw; background: #99f6e4; animation: liquidFloat 22s ease-in-out infinite alternate-reverse; }
        .shape3 { top: 30%; left: 40%; width: 50vw; height: 50vw; background: #cffafe; animation: liquidFloat 15s ease-in-out infinite alternate; }

        @keyframes liquidFloat {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            50% { transform: translate(30px, 60px) scale(1.1) rotate(45deg); }
            100% { transform: translate(-30px, -40px) scale(0.9) rotate(-15deg); }
        }

        /* iOS 26 Liquid Glass System */
        .glass-header {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.02);
        }

        .glass-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.4));
            backdrop-filter: blur(30px) saturate(150%);
            -webkit-backdrop-filter: blur(30px) saturate(150%);
            border: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-highlight);
            border-left: 1px solid var(--glass-highlight);
            box-shadow: 0 10px 30px -10px var(--glass-shadow), inset 0 2px 4px rgba(255, 255, 255, 0.8);
            border-radius: 28px;
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 100%;
            background: linear-gradient(180deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 30%);
            pointer-events: none;
        }

        /* Modern UI Animations (Micro-interactions) */
        .glass-btn-interactive {
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        @media (hover: hover) {
            .glass-btn-interactive:hover {
                transform: translateY(-2px) scale(1.01);
                box-shadow: 0 12px 25px -8px rgba(0, 0, 0, 0.08), inset 0 2px 4px rgba(255, 255, 255, 0.9);
                background: linear-gradient(145deg, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.5));
            }
            .dock-btn:hover {
                transform: translateY(-3px) scale(1.1);
                background: rgba(255, 255, 255, 0.5);
            }
        }

        .glass-btn-interactive:active, .dock-btn:active {
            transform: scale(0.96);
            transition: all 0.1s ease-out;
        }

        /* Floating Animation */
        @keyframes floatUpDown {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        .anim-float { animation: floatUpDown 5s ease-in-out infinite; }

        /* FADE IN / FADE OUT SYSTEM */
        .fade-up {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.7s cubic-bezier(0.2, 0.8, 0.2, 1), transform 0.7s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .view-active .fade-up { opacity: 1; transform: translateY(0); }
        .view-hidden-left .fade-up { opacity: 0; transform: translateY(-10px); transition: opacity 0.4s ease-out, transform 0.4s ease-out; }

        /* FLOATING DOCK ANIMATION */
        .dock-container { transition: opacity 0.7s cubic-bezier(0.2, 0.8, 0.2, 1), transform 0.7s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .dock-visible { opacity: 1; transform: translate(-50%, 0); }
        .dock-hidden { opacity: 0; transform: translate(-50%, 60px); pointer-events: none; }

        /* View Architecture */
        .view-container {
            position: relative;
            width: 100%;
            padding-top: calc(80px + var(--safe-top)); 
            padding-bottom: calc(100px + var(--safe-bottom)); 
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .page-view {
            position: absolute;
            top: calc(80px + var(--safe-top));
            left: 0;
            width: 100%;
            padding: 20px 24px calc(40px + var(--safe-bottom)) 24px;
            box-sizing: border-box;
            max-width: 600px; 
            margin: 0 auto;
            right: 0;
            transition: visibility 0.6s;
        }

        .view-active { visibility: visible; pointer-events: auto; z-index: 10; }
        .view-hidden-left { visibility: hidden; pointer-events: none; z-index: 0; }
        
        .view-hidden-right {
            visibility: hidden; opacity: 0; transform: translateX(100%);
            pointer-events: none; z-index: 20; 
            transition: all 0.55s cubic-bezier(0.25, 1, 0.2, 1);
        }
        .view-active-right {
            visibility: visible; opacity: 1; transform: translateX(0);
            pointer-events: auto; z-index: 20;
            transition: all 0.55s cubic-bezier(0.25, 1, 0.2, 1);
        }

        /* Video Ratio 1080x2400 (Portrait Embed) */
        .video-container-limiter {
            width: 100%;
            max-width: 320px; 
            margin: 0 auto;
            border-radius: 28px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.05);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.4), 0 20px 40px -10px rgba(0,0,0,0.1);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 222.22%; 
            height: 0;
            overflow: hidden;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            border-radius: 28px;
        }

        .text-gradient {
            background: linear-gradient(135deg, #0f172a, #334155);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

                    <div class="flex items-center gap-4">
                        <div class="w-14 h-14 rounded-[1.2rem] overflow-hidden bg-white/40 border border-white/50 shadow-sm flex-shrink-0">
                            <img src="https://res.cloudinary.com/dwctfnwdu/image/upload/v1772742459/gklrub9kfndkshqhaevi.png" alt="Winkit" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500 ease-out">

        <!-- ==================== VIEW 2: VIDEO DETAIL ==================== -->

                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
            </a>
            <!-- Menuju bagian STORE -->
            <a href="index.html#store" class="dock-btn w-[3.5rem] h-[3.5rem] rounded-full bg-white/30 backdrop-blur-md flex items-center justify-center text-purple-500 shadow-sm transition-all duration-300">

            </a>
        </div>

    <!-- Core Logic (Router & Iframe Injector) -->
    <script>
        const videoDatabase = {
            google: {
                id: "video-google",
                title: "Cara Login Google",
                url: "https://jumpshare.com/embed/30Imzc9L1SUMtE4IxPEt" 
            },
            wink: {
                id: "video-wink",
                title: "Cara Login Wink",
                url: "https://jumpshare.com/embed/hC9QDjcDQYVtyrraovOp"
            },
            winkit: {
                id: "video-winkit",
                title: "Cara Login Winkit",
                url: "https://jumpshare.com/embed/MaD5p1axNi9Q7v6Pwfiy"
            },
            meitu: {
                id: "video-meitu",
                title: "Cara Login Meitu",
                url: "https://jumpshare.com/embed/bqYMoUOlinqBPFaTwDAz"
            },
            wink_china: {
                id: "video-wink-china",
                title: "Cara Login Wink China",
                url: "https://jumpshare.com/embed/qKCKbM5dEFNtUu9x63jn"
            },
            x_design: {
                id: "video-xdesign",
                title: "Cara Login X-Design",
                url: "https://jumpshare.com/embed/3PWAdAzpUkuaM6hZ1tof"
            }
        };

        const viewMenu = document.getElementById('view-menu');
        const viewVideo = document.getElementById('view-video');
        const videoTitle = document.getElementById('video-title');
        const videoWrapper = document.getElementById('video-wrapper');
        const floatingDock = document.getElementById('floating-dock');

        function openVideo(appId) {
            const data = videoDatabase[appId];
            if(!data) return;

            videoTitle.textContent = data.title;
            
            videoWrapper.innerHTML = `
                <iframe 
                    id="${data.id}" 
                    src="${data.url}" 
                    frameborder="0" 
                    webkitallowfullscreen 
                    mozallowfullscreen 
                    allowfullscreen>
                </iframe>
            `;

            viewMenu.className = 'page-view view-hidden-left';
            floatingDock.classList.remove('dock-visible');
            floatingDock.classList.add('dock-hidden');
            
            setTimeout(() => {
                viewVideo.className = 'page-view view-active-right';
            }, 50); 
        }

        function closeVideo() {
            videoWrapper.innerHTML = ''; 
            
            viewVideo.className = 'page-view view-hidden-right';
            
            setTimeout(() => {
                viewMenu.className = 'page-view view-active';
                floatingDock.classList.remove('dock-hidden');
                floatingDock.classList.add('dock-visible');
            }, 50);
        }
    </script>
</body>
</html>

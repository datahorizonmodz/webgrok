<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DATZON Feedback</title>
    <!-- Use main app styles -->
    <link rel="stylesheet" href="app.css">
    
    <style>
        /* =========================================================
           FEEDBACK SPECIFIC STYLES (Extending app.css)
           ========================================================= */
        
        /* View Stack Controller */
        .view-container {
            position: relative;
            width: 100%;
            min-height: 500px;
        }
        .view-panel {
            position: absolute;
            top: 0; left: 0; width: 100%;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: translateY(15px);
            transition: opacity 0.4s ease, transform 0.4s ease, visibility 0.4s;
        }
        .view-panel.active-view {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transform: translateY(0);
            position: relative;
        }

        /* History Activity Cards */
        .history-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .history-card:hover {
            border-color: var(--accent-light);
        }
        .history-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
            gap: 12px;
        }
        .history-card-title {
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--text-main);
            margin-bottom: 4px;
            line-height: 1.3;
        }
        .history-card-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .history-card-desc {
            font-size: 0.9rem;
            color: var(--text-main);
            line-height: 1.5;
        }

        /* Status Badges */
        .status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .status-waiting { background: rgba(234, 179, 8, 0.15); color: #ca8a04; border: 1px solid rgba(234, 179, 8, 0.3); }
        .status-progress { background: rgba(59, 130, 246, 0.15); color: #2563eb; border: 1px solid rgba(59, 130, 246, 0.3); }
        .status-resolved { background: rgba(34, 197, 94, 0.15); color: #16a34a; border: 1px solid rgba(34, 197, 94, 0.3); }
        [data-theme="dark"] .status-waiting { color: #fef08a; }
        [data-theme="dark"] .status-progress { color: #bfdbfe; }
        [data-theme="dark"] .status-resolved { color: #bbf7d0; }

        /* Admin Response Thread */
        .admin-response {
            margin-top: 14px;
            padding-left: 14px;
            border-left: 3px solid var(--accent);
            background: var(--surface-glass);
            padding-top: 10px;
            padding-bottom: 10px;
            padding-right: 10px;
            border-radius: 0 8px 8px 0;
        }
        .admin-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 4px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .admin-meta::before {
            content: '';
            display: block;
            width: 6px; height: 6px;
            background: var(--accent);
            border-radius: 50%;
        }
        .admin-text {
            font-size: 0.85rem;
            color: var(--text-main);
            font-style: italic;
        }

        /* Toast Notification */
        #toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 0.95rem;
            font-weight: 700;
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.3);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
        }
        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Loading & Empty States */
        .loading-history {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-weight: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .empty-history {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        /* Custom Desktop Overrides for Standalone Feedback Page */
        @media (min-width: 700px) {
            .app-container.feedback-container {
                margin: 0 auto !important;
                max-width: 600px !important;
                width: 100% !important;
                box-shadow: 0 0 40px rgba(0,0,0,0.05) !important;
            }
            header.feedback-header {
                left: 50% !important;
                transform: translateX(-50%) !important;
                width: 100% !important;
                max-width: 600px !important;
                justify-content: space-between;
            }
            .bottom-dock.feedback-dock {
                left: 50% !important;
                transform: translateX(-50%) !important;
            }
        }
    </style>
</head>
<body>

    <!-- Main Container matches main DATZON layout -->
    <div class="app-container feedback-container">
        
        <!-- Header -->
        <header id="header" class="feedback-header">
            <div class="header-left">
                <!-- Back Button instead of Hamburger -->
                <a href="index.html" class="icon-btn" title="Back to Home">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </a>
                <h1 class="header-title" style="margin-left: 8px;">FEEDBACK</h1>
            </div>

            <div class="header-right">
                <!-- Theme Toggle matching app.js -->
                <button id="theme-btn" class="icon-btn theme-toggle">
                    <span class="icon-inner" id="icon-moon">
                        <svg class="anim-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    </span>
                    <span class="icon-inner" id="icon-sun">
                        <svg class="anim-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    </span>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main id="main-content">
            <div class="view-container">
                
                <!-- View 1: Form Feedback -->
                <div id="view-form" class="view-panel active-view">
                    <div class="msg-card" style="padding: 24px;">
                        <h2 class="card-title" style="margin-bottom: 24px; display: flex; align-items: center; gap: 8px;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 3a3 3 0 0 0-4 0h-4a3 3 0 0 0-4 0H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2h-2Z"></path><path d="M8 18h1"></path><path d="M18.4 8.6 15 12l-3-3"></path><path d="M15 12v6"></path></svg>
                            Submit Feedback
                        </h2>
                        
                        <form id="feedbackForm">
                            <label style="display:block; margin-bottom: 6px; font-size: 0.85rem; color: var(--text-muted); font-weight: 700;">Your Name</label>
                            <input type="text" id="name" required class="input-field" placeholder="Name Your">
                            
                            <label style="display:block; margin-bottom: 6px; font-size: 0.85rem; color: var(--text-muted); font-weight: 700;">Subject</label>
                            <input type="text" id="subject" required class="input-field" placeholder="Request Aplikasi dll">
                            
                            <label style="display:block; margin-bottom: 6px; font-size: 0.85rem; color: var(--text-muted); font-weight: 700;">Description</label>
                            <textarea id="description" required rows="4" class="input-field" style="resize: none;" placeholder="Jelaskan apa masalahnya..."></textarea>
                            
                            <button type="submit" id="submitBtn" class="btn-primary" style="margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 8px;">
                                <span>Send Feedback</span>
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                            </button>
                        </form>
                    </div>
                </div>

                <!-- View 2: Recent Activity / Inbox -->
                <div id="view-activity" class="view-panel inactive-view">
                    <div style="margin-bottom: 20px;">
                        <h2 class="card-title" style="display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); padding-bottom: 16px;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"></polyline><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path></svg>
                            Recent Activity
                        </h2>
                    </div>
                    
                    <div id="historyList">
                        <!-- State Loading -->
                        <div id="loadingHistory" class="loading-history">
                            <div class="spinner" style="border-width: 3px; width: 32px; height: 32px; border-top-color: var(--accent);"></div>
                            Loading activities...
                        </div>
                    </div>
                </div>
                
            </div>
        </main>

        <!-- Floating Bottom Dock matching app.css -->
        <div id="mainDock" class="bottom-dock feedback-dock">
            <div id="dockIndicator" class="dock-indicator"></div>
            
            <!-- Tab 1: Feedback Form -->
            <div class="dock-tab active-tab" data-index="0">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 3a3 3 0 0 0-4 0h-4a3 3 0 0 0-4 0H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2h-2Z"></path></svg>
                <span class="tab-text">Feedback</span>
            </div>
            
            <!-- Tab 2: Activity History -->
            <div class="dock-tab" data-index="1">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"></polyline><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path></svg>
                <span class="tab-text">Activity</span>
            </div>
        </div>

        <!-- Notification Toast -->
        <div id="toast">Feedback submitted successfully!</div>
    </div>

    <!-- Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // --- THEME INITIALIZATION ---
        const themeBtn = document.getElementById('theme-btn');
        const html = document.documentElement;
        
        // Sync theme with main app if available in localStorage
        const savedTheme = localStorage.getItem('datzon_theme') || 'light';
        html.setAttribute('data-theme', savedTheme);

        themeBtn.addEventListener('click', () => {
            const isLight = html.getAttribute('data-theme') === 'light';
            const newTheme = isLight ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('datzon_theme', newTheme);
        });

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyCaCVfxYTP3IvR6Jrh3mM0GBsvYKJRjRe4",
            authDomain: "datzon-web.firebaseapp.com",
            projectId: "datzon-web",
            storageBucket: "datzon-web.firebasestorage.app",
            messagingSenderId: "310892115798",
            appId: "1:310892115798:web:a03fb9d2b2137933b948f7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const feedbackCollectionName = 'feedback';

        // --- DOCK NAVIGATION LOGIC (Kept identical to original) ---
        const dock = document.getElementById('mainDock');
        const indicator = document.getElementById('dockIndicator');
        const tabs = document.querySelectorAll('.dock-tab');
        const viewForm = document.getElementById('view-form');
        const viewActivity = document.getElementById('view-activity');
        
        let activeIndex = 0;
        let isDragging = false;
        let startX = 0;
        let baseTranslateX = 0;
        let maxTranslateX = 0;

        function setActiveTab(index) {
            activeIndex = index;
            
            // Re-calc for safety
            const indicatorWidth = indicator.offsetWidth;
            maxTranslateX = dock.offsetWidth - indicatorWidth - 12; // 12px total padding inner dock
            
            const targetX = index === 0 ? 0 : maxTranslateX;
            baseTranslateX = targetX;
            
            indicator.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.2s ease, background 0.2s ease';
            indicator.style.transform = `translateX(${targetX}px) scale(1)`;
            
            tabs.forEach((tab, i) => {
                if(i === index) tab.classList.add('active-tab');
                else tab.classList.remove('active-tab');
            });

            if (index === 0) {
                viewForm.classList.replace('inactive-view', 'active-view');
                viewActivity.classList.replace('active-view', 'inactive-view');
            } else {
                viewActivity.classList.replace('inactive-view', 'active-view');
                viewForm.classList.replace('active-view', 'inactive-view');
            }
        }

        function startDockDrag(e) {
            if (!dock || dock.offsetWidth === 0) return;
            isDragging = true;
            startX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            
            maxTranslateX = dock.offsetWidth - indicator.offsetWidth - 12;
            indicator.classList.add('lifted');
            indicator.style.transform = `translateX(${baseTranslateX}px) scale(1.05)`;
        }

        function moveDockDrag(e) {
            if (!isDragging) return;
            e.preventDefault(); 
            
            const currentX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            const deltaX = currentX - startX;
            
            let newX = baseTranslateX + deltaX;
            if (newX < 0) newX = 0;
            if (newX > maxTranslateX) newX = maxTranslateX;

            indicator.style.transform = `translateX(${newX}px) scale(1.05)`;
        }

        function endDockDrag(e) {
            if (!isDragging) return;
            isDragging = false;
            
            indicator.classList.remove('lifted');
            
            const currentTransform = indicator.style.transform;
            const match = currentTransform.match(/translateX\(([-\d.]+)px\)/);
            const currentX = match ? parseFloat(match[1]) : baseTranslateX;
            
            const threshold = maxTranslateX / 2;
            const targetIndex = currentX > threshold ? 1 : 0;
            
            setActiveTab(targetIndex);
        }

        dock.addEventListener('mousedown', startDockDrag);
        window.addEventListener('mousemove', moveDockDrag, {passive: false});
        window.addEventListener('mouseup', endDockDrag);

        dock.addEventListener('touchstart', startDockDrag, {passive: false});
        window.addEventListener('touchmove', moveDockDrag, {passive: false});
        window.addEventListener('touchend', endDockDrag);

        tabs.forEach((tab, index) => {
            tab.addEventListener('click', () => setActiveTab(index));
        });

        // Init on load
        setTimeout(() => setActiveTab(0), 100);
        window.addEventListener('resize', () => { if(!isDragging) setActiveTab(activeIndex); });

        // --- FIREBASE FORM & HISTORY LOGIC ---
        const form = document.getElementById('feedbackForm');
        const submitBtn = document.getElementById('submitBtn');
        const toast = document.getElementById('toast');
        const historyList = document.getElementById('historyList');
        const loadingHistory = document.getElementById('loadingHistory');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const subject = document.getElementById('subject').value;
            const description = document.getElementById('description').value;

            const originalBtnHtml = submitBtn.innerHTML;
            
            // Inline SVG spinner matching theme
            const spinnerSvg = `<svg style="animation: spin 1s linear infinite; margin-right: 8px;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" stroke="rgba(255,255,255,0.3)"></circle><path d="M12 2a10 10 0 0 1 10 10" stroke="#fff"></path></svg>`;
            submitBtn.innerHTML = spinnerSvg + '<span>Sending...</span>';
            submitBtn.disabled = true;

            try {
                await addDoc(collection(db, feedbackCollectionName), {
                    name: name,
                    subject: subject,
                    description: description,
                    status: "Waiting",
                    timestamp: serverTimestamp()
                });

                form.reset();
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 4000);
            } catch (error) {
                console.error("Error adding document: ", error);
                alert("Failed to send feedback.");
            } finally {
                submitBtn.innerHTML = originalBtnHtml;
                submitBtn.disabled = false;
            }
        });

        const q = query(collection(db, feedbackCollectionName));
        
        onSnapshot(q, (snapshot) => {
            loadingHistory.style.display = 'none';
            
            if (snapshot.empty) {
                historyList.innerHTML = `
                    <div class="empty-history">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="margin: 0 auto 16px auto; opacity: 0.3; display: block;"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"></polyline><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path></svg>
                        <p style="margin-bottom: 8px; font-weight: 700; color: var(--text-main);">No feedback found yet.</p>
                        <p style="font-size: 0.85rem;">Be the first to share your thoughts!</p>
                    </div>`;
                return;
            }

            let feedbacks = [];
            snapshot.forEach((doc) => {
                feedbacks.push({ id: doc.id, ...doc.data() });
            });
            
            feedbacks.sort((a, b) => {
                const timeA = a.timestamp ? a.timestamp.toMillis() : 0;
                const timeB = b.timestamp ? b.timestamp.toMillis() : 0;
                return timeB - timeA;
            });

            historyList.innerHTML = feedbacks.map(item => {
                let dateStr = "Just now";
                if (item.timestamp) {
                    const date = item.timestamp.toDate();
                    dateStr = new Intl.DateTimeFormat('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }).format(date);
                }

                const statusStr = item.status || 'Waiting';
                let statusClass = 'status-waiting';
                if (statusStr.toLowerCase() === 'in progress') statusClass = 'status-progress';
                if (statusStr.toLowerCase() === 'resolved') statusClass = 'status-resolved';

                let adminResponseHtml = '';
                if (item.adminResponse) {
                    let adminDateStr = '';
                    if (item.adminTimestamp) {
                        const aDate = item.adminTimestamp.toDate();
                        adminDateStr = new Intl.DateTimeFormat('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }).format(aDate);
                    }
                    adminResponseHtml = `
                        <div class="admin-response">
                            <div class="admin-meta">Admin Response &bull; ${adminDateStr}</div>
                            <div class="admin-text">"${item.adminResponse}"</div>
                        </div>
                    `;
                }

                return `
                    <div class="history-card">
                        <div class="history-card-header">
                            <div>
                                <h3 class="history-card-title">${escapeHtml(item.subject)}</h3>
                                <p class="history-card-meta">${escapeHtml(item.name)} &bull; ${dateStr}</p>
                            </div>
                            <span class="status-badge ${statusClass}">${statusStr}</span>
                        </div>
                        <p class="history-card-desc">${escapeHtml(item.description)}</p>
                        ${adminResponseHtml}
                    </div>
                `;
            }).join('');
        });

        function escapeHtml(unsafe) {
            if (!unsafe) return "";
            return unsafe.toString().replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>

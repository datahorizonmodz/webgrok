<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATZON V6.1 - AM & Wink System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-primary { background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); }
        .active-tab { background: #2563eb; color: white; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4); }
        .locked { border-color: #ef4444 !important; color: #ef4444 !important; }
        .input-num::placeholder { color: #334155; opacity: 1; }
        /* Scrollbar hidden for tabs */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-200 min-h-screen p-4 flex flex-col items-center">

    <div class="w-full max-w-md space-y-6 mt-4 pb-20">
        <div class="text-center">
            <h1 class="text-4xl font-black tracking-tighter text-white uppercase italic">Datzon<span class="text-blue-500 not-italic ml-1 text-sm">V6.1</span></h1>
            <div id="connStatus" class="inline-flex items-center space-x-2 mt-2 px-3 py-1 bg-slate-900 rounded-full border border-slate-800">
                <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Menghubungkan...</span>
            </div>
        </div>

        <div class="flex p-1.5 bg-slate-900/80 rounded-2xl border border-slate-800 overflow-x-auto snap-x no-scrollbar gap-1">
            <button onclick="setTab('gen')" id="tGen" class="min-w-[80px] flex-1 py-3 rounded-xl text-[10px] sm:text-[11px] font-bold active-tab transition-all uppercase tracking-wider snap-center">AM Gen</button>
            <button onclick="setTab('wink')" id="tWink" class="min-w-[80px] flex-1 py-3 rounded-xl text-[10px] sm:text-[11px] font-bold text-slate-500 transition-all uppercase tracking-wider snap-center">Wink</button>
            <button onclick="setTab('history')" id="tHistory" class="min-w-[80px] flex-1 py-3 rounded-xl text-[10px] sm:text-[11px] font-bold text-slate-500 transition-all uppercase tracking-wider snap-center">Riwayat</button>
            <button onclick="setTab('admin')" id="tAdmin" class="min-w-[80px] flex-1 py-3 rounded-xl text-[10px] sm:text-[11px] font-bold text-slate-500 transition-all uppercase tracking-wider snap-center">Sync</button>
        </div>

        <div id="viewGen" class="space-y-6 animate-in fade-in duration-500">
            <div class="glass p-6 rounded-[2.5rem] shadow-2xl space-y-5 relative overflow-hidden">
                <div id="limitIndicator" class="hidden absolute top-0 left-0 w-full bg-red-600/20 text-red-500 text-[9px] font-bold py-1.5 text-center uppercase tracking-widest">Limit Akun Tercapai! Terkunci</div>
                
                <div class="pt-2">
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-3 text-center tracking-widest flex items-center justify-center gap-2">
                        <span>Nomor Akun AM</span>
                        <span id="lastGenLabel" class="bg-blue-600/20 text-blue-400 px-2 py-0.5 rounded-md hidden">Terakhir: <span id="lastGenNumberText"></span></span>
                    </label>
                    <input type="number" id="accNum" placeholder="---" 
                        class="w-full bg-slate-950 border border-slate-800 rounded-3xl p-5 outline-none text-5xl text-center font-black text-blue-500 focus:border-blue-600 transition-all input-num">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="changeType('PRIVATE')" id="pBtn" class="py-4 rounded-2xl font-bold text-xs border-2 border-blue-600 bg-blue-600/10 text-blue-400 transition-all">PRIVATE</button>
                    <button onclick="changeType('SHARING')" id="sBtn" class="py-4 rounded-2xl font-bold text-xs border-2 border-transparent bg-slate-900 text-slate-500 transition-all">SHARING</button>
                </div>

                <div class="space-y-3 pt-2">
                    <button onclick="handleFetchClick()" id="fetchBtn"
                        class="w-full btn-primary p-5 rounded-[1.5rem] font-bold text-white active:scale-95 transition-all shadow-xl shadow-blue-900/20 uppercase tracking-wider">
                        Dapatkan Data AM
                    </button>
                    <button onclick="generateNext()" id="nextBtn"
                        class="hidden w-full bg-slate-800 border border-slate-700 p-4 rounded-[1.5rem] font-bold text-slate-300 hover:bg-slate-700 active:scale-95 transition-all uppercase tracking-widest text-xs flex items-center justify-center gap-2">
                        <span>Berikutnya</span>
                        <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                    </button>
                </div>
            </div>

            <div id="resBox" class="hidden glass p-6 rounded-[2.5rem] space-y-4 border-blue-500/20">
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-bold text-blue-500 uppercase">Hasil Generate AM:</span>
                    <button onclick="copyToClipboard('resText')" class="bg-blue-600 text-[10px] px-5 py-2 rounded-full font-bold shadow-lg shadow-blue-500/30">SALIN AM</button>
                </div>
                <div id="resText" class="text-[11px] font-mono text-slate-300 whitespace-pre-wrap leading-relaxed bg-black/50 p-5 rounded-2xl border border-white/5 overflow-x-auto"></div>
            </div>
        </div>

        <div id="viewWink" class="hidden space-y-6 animate-in fade-in duration-500">
            <div class="glass p-6 rounded-[2.5rem] shadow-2xl space-y-5">
                <div class="text-center space-y-1 mb-4">
                    <h2 class="text-xl font-black text-white uppercase tracking-wider italic text-pink-500">WINK PREMIUM</h2>
                    <p class="text-[10px] text-slate-400 uppercase tracking-widest">Input Instan Web Template</p>
                </div>
                
                <div class="pt-2 space-y-2">
                    <label class="block text-[10px] font-bold text-slate-500 uppercase text-center tracking-widest">
                        Format: Email|Password
                    </label>
                    <input type="text" id="winkInput" placeholder="danzycoze@gmail.com|qweqweqwe" 
                        class="w-full bg-slate-950 border border-slate-800 rounded-3xl p-5 outline-none text-center font-bold text-pink-400 focus:border-pink-600 transition-all input-num text-sm">
                </div>

                <div class="space-y-3 pt-4">
                    <button onclick="generateWink()" 
                        class="w-full bg-gradient-to-r from-pink-600 to-rose-600 p-5 rounded-[1.5rem] font-bold text-white active:scale-95 transition-all shadow-xl shadow-pink-900/20 uppercase tracking-wider">
                        Generate Data Wink
                    </button>
                </div>
            </div>

            <div id="resBoxWink" class="hidden glass p-6 rounded-[2.5rem] space-y-4 border-pink-500/20">
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-bold text-pink-500 uppercase">Hasil Generate Wink:</span>
                    <button onclick="copyToClipboard('resTextWink', 'pink')" class="bg-pink-600 text-[10px] px-5 py-2 rounded-full font-bold shadow-lg shadow-pink-500/30">SALIN WINK</button>
                </div>
                <div id="resTextWink" class="text-[11px] font-mono text-slate-300 whitespace-pre-wrap leading-relaxed bg-black/50 p-5 rounded-2xl border border-white/5 overflow-x-auto"></div>
            </div>
        </div>

        <div id="viewHistory" class="hidden space-y-4 animate-in fade-in duration-300">
            <div class="space-y-3" id="historyContainer">
                <div class="text-center py-10 text-slate-600 text-xs italic">Memuat riwayat...</div>
            </div>
        </div>

        <div id="viewAdmin" class="hidden space-y-6">
            <div class="glass p-6 rounded-[2.5rem] space-y-4">
                <div class="text-center mb-2">
                    <h3 class="text-xs font-bold text-blue-400 uppercase">Sync Database AM</h3>
                </div>
                <textarea id="bulkText" rows="12" placeholder="Paste data akun AM (88. email | link)..." 
                    class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 text-[10px] font-mono outline-none h-64 focus:border-blue-500 text-blue-200"></textarea>

                <button onclick="bulkUploadBatch()" id="uploadBtn"
                    class="w-full bg-white text-black p-5 rounded-3xl font-bold hover:bg-slate-200 transition-all uppercase tracking-wider">
                    Sync Ke Cloud
                </button>
            </div>
        </div>

        <div id="securityModal" class="fixed inset-0 bg-black/90 backdrop-blur-md z-[100] hidden flex items-center justify-center p-6 animate-in zoom-in duration-200">
            <div class="glass w-full max-w-sm p-8 rounded-[2.5rem] border-red-500/30 text-center space-y-6">
                <div class="w-16 h-16 bg-red-500/10 border border-red-500/20 rounded-full flex items-center justify-center mx-auto">
                    <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
                <div class="space-y-1">
                    <h2 class="text-xl font-bold text-white uppercase tracking-tighter">Override Keamanan</h2>
                    <p class="text-[9px] text-slate-400 uppercase tracking-widest">Pilih tipe baru & masukkan password</p>
                </div>
                
                <div class="flex gap-2">
                    <button onclick="setForceType('PRIVATE')" id="fPrivateBtn" class="flex-1 py-3 rounded-xl bg-blue-600/20 text-blue-400 border border-blue-500 font-bold text-[10px] transition-all uppercase">PRIVATE</button>
                    <button onclick="setForceType('SHARING')" id="fSharingBtn" class="flex-1 py-3 rounded-xl bg-slate-900 text-slate-500 border border-transparent font-bold text-[10px] transition-all uppercase">SHARING</button>
                </div>

                <input type="password" id="forcePass" placeholder="Password: paksa" 
                    class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 outline-none text-center font-bold focus:border-red-600 transition-all text-white">
                
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="closeSecurityModal()" class="bg-slate-800 p-4 rounded-2xl text-[10px] font-bold uppercase text-slate-300">Batal</button>
                    <button onclick="confirmForceGenerate()" class="bg-red-600 p-4 rounded-2xl text-[10px] font-bold uppercase text-white shadow-lg shadow-red-600/20">Eksekusi</button>
                </div>
            </div>
        </div>

        <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-full text-xs font-bold shadow-2xl hidden z-50"></div>
        
        <footer class="text-center text-slate-700 text-[9px] tracking-[0.5em] uppercase py-8 font-bold">
            Datzon Ecosystem &copy; 2026
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, writeBatch, onSnapshot, collection, query } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDI4w8gIPE_kqGrKOSpcz84xUHDirwWqcw",
            authDomain: "datzonweb.firebaseapp.com",
            projectId: "datzonweb",
            storageBucket: "datzonweb.firebasestorage.app",
            messagingSenderId: "357601269435",
            appId: "1:357601269435:web:fe993d66e4b7d6c9ba7b9e",
            measurementId: "G-V4KQ5QJKVN"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = "am-generator-datzon"; 

        let user = null;
        let type = 'PRIVATE';
        let forceType = 'PRIVATE';
        let forceClickCount = 0;
        let lastTargetId = '';
        let lastGeneratedGlobalNumber = null; 

        onAuthStateChanged(auth, (u) => {
            const status = document.getElementById('connStatus');
            if (u) {
                user = u;
                status.innerHTML = '<div class="w-2 h-2 rounded-full bg-green-500"></div><span class="text-[10px] font-bold text-green-500 uppercase tracking-widest">Server Online</span>';
                listenToHistory();
            } else {
                signInAnonymously(auth);
            }
        });

        // Tab Handler
        window.setTab = (t) => {
            const tabs = ['viewGen', 'viewWink', 'viewAdmin', 'viewHistory'];
            tabs.forEach(tab => document.getElementById(tab).classList.add('hidden'));
            document.getElementById('view' + t.charAt(0).toUpperCase() + t.slice(1)).classList.remove('hidden');
            
            const btnAct = 'min-w-[80px] flex-1 py-3 rounded-xl text-[10px] sm:text-[11px] font-bold active-tab transition-all uppercase tracking-wider snap-center';
            const btnInact = 'min-w-[80px] flex-1 py-3 rounded-xl text-[10px] sm:text-[11px] font-bold text-slate-500 transition-all uppercase tracking-wider snap-center';

            document.getElementById('tGen').className = t === 'gen' ? btnAct : btnInact;
            document.getElementById('tWink').className = t === 'wink' ? btnAct : btnInact;
            document.getElementById('tHistory').className = t === 'history' ? btnAct : btnInact;
            document.getElementById('tAdmin').className = t === 'admin' ? btnAct : btnInact;
        };

        // --- WINK GENERATOR LOGIC ---
        window.generateWink = () => {
            const input = document.getElementById('winkInput').value.trim();
            if(!input) return notify("Input email|password dulu!", "red");

            const parts = input.split('|');
            if(parts.length !== 2) return notify("Format salah! Harus: email|password", "red");

            const email = parts[0].trim();
            const password = parts[1].trim();

            const tplWink = `WINK PREMIUM 1 BULAN RENEW

𝗗𝗔𝗧𝗔 𝗔𝗞𝗨𝗡
📧 Email : ${email}
🔑 Password : ${password}

- Pembelian 1 Bulan Full Garansi 

🏷 Harap Ikuti Tutorial Login Terlebih Dahulu : 
1. loginin ke google akun yang di atas
2. jika belum tahu caranya bisa cek di link bawah
3. hapus aplikasi wink jika sudah terinstall
4. buka play store dan gunakan akun yang di premium in ke play store nya
5. kalau play storenya sudah pakai akun yang di premium in, download winknya
6. buka wink dan login lewat google 
7. login menggunakan akun yang di atas
8. jika sudah login klik langganan/perbarui sekarang terus klik pulihkan pembelian di pojok kanan bawah kecil tulisannya 
9. jika sudah muncul tanggal seperti 11/02/26 artinya sudah premium
10. jika masih belum paham bisa cek tutorial lengkap nya di link ini
11. https://datahorizonmodz.github.io/webgrok/caralogin.html
12. setelah winknya sudah benar benar premium 
13. harap batalkan premium winknya di play store
14. caranya sudah ada di link atas
15. jika ada kendala masalah atau problem chat admin yaa`;

            document.getElementById('resTextWink').innerText = tplWink;
            document.getElementById('resBoxWink').classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        };


        // --- ALIGHT MOTION LOGIC ---
        window.changeType = (t) => {
            type = t;
            document.getElementById('pBtn').className = t === 'PRIVATE' ? 'py-4 rounded-2xl font-bold text-xs border-2 border-blue-600 bg-blue-600/10 text-blue-400 transition-all' : 'py-4 rounded-2xl font-bold text-xs border-2 border-transparent bg-slate-900 text-slate-500 transition-all';
            document.getElementById('sBtn').className = t === 'SHARING' ? 'py-4 rounded-2xl font-bold text-xs border-2 border-purple-600 bg-purple-600/10 text-purple-400 transition-all' : 'py-4 rounded-2xl font-bold text-xs border-2 border-transparent bg-slate-900 text-slate-500 transition-all';
        };

        window.setForceType = (t) => {
            forceType = t;
            document.getElementById('fPrivateBtn').className = t === 'PRIVATE' ? 'flex-1 py-3 rounded-xl bg-blue-600/20 text-blue-400 border border-blue-500 font-bold text-[10px] transition-all uppercase' : 'flex-1 py-3 rounded-xl bg-slate-900 text-slate-500 border border-transparent font-bold text-[10px] transition-all uppercase';
            document.getElementById('fSharingBtn').className = t === 'SHARING' ? 'flex-1 py-3 rounded-xl bg-purple-600/20 text-purple-400 border border-purple-500 font-bold text-[10px] transition-all uppercase' : 'flex-1 py-3 rounded-xl bg-slate-900 text-slate-500 border border-transparent font-bold text-[10px] transition-all uppercase';
        };

        window.generateNext = () => {
            if(!lastGeneratedGlobalNumber) return notify("Belum ada riwayat terakhir!", "red");
            const nextAcc = lastGeneratedGlobalNumber + 1;
            document.getElementById('accNum').value = nextAcc;
            handleFetchClick(); 
        };

        window.handleFetchClick = async () => {
            const num = document.getElementById('accNum').value;
            if(!num) return notify("Input nomor akun!", "red");

            if(lastTargetId !== num) {
                forceClickCount = 0;
                lastTargetId = num;
            }

            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'accounts', num);
            const snap = await getDoc(docRef);

            if(!snap.exists()) return notify("Akun belum terdaftar di Cloud!", "red");

            const data = snap.data();
            const count = data.genCount || 0;

            let isLimit = false;
            if(count > 0) {
                if(data.lastType === 'PRIVATE') isLimit = true;
                else if(data.lastType === 'SHARING' && count >= 3) isLimit = true;
            }

            if(isLimit) {
                forceClickCount++;
                document.getElementById('accNum').classList.add('locked');
                document.getElementById('limitIndicator').classList.remove('hidden');

                if(forceClickCount >= 3) {
                    openSecurityModal();
                } else {
                    notify(`Ter-Lock! Klik ${3 - forceClickCount}x lagi untuk Override`, "red");
                }
                return;
            }

            executeGenerate(num, data.email, data.link, count, type);
        };

        async function executeGenerate(num, email, link, currentCount, targetType) {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'accounts', num);
            
            try {
                await updateDoc(docRef, {
                    genCount: currentCount + 1,
                    lastType: targetType,
                    lastGenerated: new Date().toISOString()
                });

                renderTemplateAM(email, link, targetType);
                notify(`Berhasil Generate Akun #${num}`);
                resetForceCounter();
            } catch (e) {
                notify("Database Terputus", "red");
            }
        }

        window.openSecurityModal = () => {
            document.getElementById('securityModal').classList.remove('hidden');
            setForceType('PRIVATE'); 
            document.getElementById('forcePass').value = "";
        };
        window.closeSecurityModal = () => {
            document.getElementById('securityModal').classList.add('hidden');
            resetForceCounter();
        };

        window.confirmForceGenerate = async () => {
            const pass = document.getElementById('forcePass').value;
            const num = document.getElementById('accNum').value;

            if(pass !== 'paksa') return notify("Password Salah!", "red");

            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'accounts', num);
            const snap = await getDoc(docRef);
            const data = snap.data();

            await updateDoc(docRef, {
                genCount: 1, 
                lastType: forceType,
                lastGenerated: new Date().toISOString(),
                forced: true
            });

            changeType(forceType);
            renderTemplateAM(data.email, data.link, forceType);
            closeSecurityModal();
            notify("Override Berhasil!", "blue");
        };

        function resetForceCounter() {
            forceClickCount = 0;
            document.getElementById('accNum').classList.remove('locked');
            document.getElementById('limitIndicator').classList.add('hidden');
        }

        function listenToHistory() {
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'accounts'));
            
            onSnapshot(q, (snap) => {
                const container = document.getElementById('historyContainer');
                container.innerHTML = "";
                
                const items = [];
                snap.forEach(doc => {
                    if(doc.data().genCount > 0) items.push({ id: doc.id, ...doc.data() });
                });

                items.sort((a, b) => new Date(b.lastGenerated) - new Date(a.lastGenerated));

                if(items.length > 0) {
                    lastGeneratedGlobalNumber = parseInt(items[0].id);
                    document.getElementById('accNum').placeholder = lastGeneratedGlobalNumber;
                    
                    document.getElementById('lastGenLabel').classList.remove('hidden');
                    document.getElementById('lastGenNumberText').innerText = lastGeneratedGlobalNumber;
                    
                    const btnNext = document.getElementById('nextBtn');
                    btnNext.classList.remove('hidden');
                    btnNext.innerHTML = `<span>Berikutnya (Akun ${lastGeneratedGlobalNumber + 1})</span><svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>`;
                }

                if(items.length === 0) {
                    container.innerHTML = `<div class="text-center py-20 text-slate-700 uppercase tracking-widest text-[10px]">Belum Ada Riwayat</div>`;
                    return;
                }

                items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "glass p-4 rounded-2xl border-white/5";
                    
                    const time = new Date(item.lastGenerated).toLocaleString('id-ID', { hour:'2-digit', minute:'2-digit' });
                    const isFull = (item.lastType === 'PRIVATE' && item.genCount >= 1) || (item.lastType === 'SHARING' && item.genCount >= 3);

                    div.innerHTML = `
                        <details class="group">
                            <summary class="flex justify-between items-center cursor-pointer list-none">
                                <div class="flex items-center space-x-3">
                                    <div class="w-10 h-10 rounded-xl bg-slate-900 flex items-center justify-center font-bold text-blue-500 border border-white/5">#${item.id}</div>
                                    <div>
                                        <p class="text-[11px] font-bold text-white uppercase">${item.lastType}</p>
                                        <p class="text-[9px] text-slate-500">${time} • Terpakai: ${item.genCount}x</p>
                                    </div>
                                </div>
                                <div class="flex items-center space-x-2">
                                    <span class="text-[8px] font-bold px-2 py-0.5 rounded-full ${isFull ? 'bg-red-500/10 text-red-500' : 'bg-green-500/10 text-green-500'} uppercase">${isFull ? 'LOCKED' : 'AVAILABLE'}</span>
                                    <svg class="w-4 h-4 text-slate-600 group-open:rotate-180 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"></path></svg>
                                </div>
                            </summary>
                            <div class="mt-4 pt-4 border-t border-white/5 text-[10px] space-y-2">
                                <div class="flex justify-between"><span class="text-slate-500">Email:</span> <span class="text-blue-300 font-mono">${item.email}</span></div>
                                <div class="flex justify-between"><span class="text-slate-500">Keterangan:</span> <span class="text-slate-300">${item.forced ? 'Override Password' : 'Sistem Normal'}</span></div>
                                <button onclick="reCopy('${item.id}')" class="w-full mt-2 bg-slate-800 py-3 rounded-xl font-bold uppercase tracking-widest text-slate-400 active:bg-blue-600 active:text-white transition-colors">Salin Ulang Teks</button>
                            </div>
                        </details>
                    `;
                    container.appendChild(div);
                });
            }, (err) => console.error("History Listener Error:", err));
        }

        window.reCopy = async (id) => {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'accounts', id);
            const snap = await getDoc(docRef);
            if(snap.exists()){
                renderTemplateAM(snap.data().email, snap.data().link, snap.data().lastType);
                copyToClipboard('resText');
                notify("Disalin Ulang!");
            }
        };

        window.bulkUploadBatch = async () => {
            const raw = document.getElementById('bulkText').value;
            if(!raw) return notify("Input data kosong!", "red");
            
            const btn = document.getElementById('uploadBtn');
            const lines = raw.split('\n');
            const batch = writeBatch(db);
            let count = 0;

            btn.disabled = true;
            btn.innerText = "SYNCING CLOUD...";

            for(let line of lines) {
                const match = line.match(/(\d+)\.\s*([^| ]+)\s*\|\s*(\S+)/);
                if(match) {
                    const no = match[1];
                    const ref = doc(db, 'artifacts', appId, 'public', 'data', 'accounts', no);
                    batch.set(ref, {
                        email: match[2],
                        link: match[3],
                        genCount: 0,
                        lastType: 'PENDING'
                    }, { merge: true });
                    count++;
                }
            }

            try {
                await batch.commit();
                notify(`Sync Selesai: ${count} Akun ✅`);
            } catch (e) {
                notify("Sync Gagal!", "red");
            } finally {
                btn.disabled = false;
                btn.innerText = "Sync Ke Cloud";
            }
        };

        function renderTemplateAM(email, link, renderType) {
            const tpl = `ALIGHT MOTION 1 TAHUN ${renderType}

𝗗𝗔𝗧𝗔 𝗔𝗞𝗨𝗡
📧 : ${email} | AKSES BUKA ${link}

• Pembelian 1 tahun garansi selama 6 bulan.

🏷 Harap Ikuti Tutorial login Terlebih Dahulu :
1. buka aplikasi alight motion, pastikan sudah update versi terbaru Play Store.
2. login menggunakan email biasa warna merah. jangan klik lewat google.
3. tempel email yang dikasih oleh seller -> klik berikutnya.
4. nah akan memerlukan link verifikasi loginnya ya
5. verifikasinya klik link AKSES BUKA email di atas yang sudah disediakan (acc seller).
6. scroll ke bawah sampai ada pesan "noreply@" warna biru/higau klik pesan paling atas scrol ke bawah lagi cari pesan "login to alight motion" atau "masuk ke alight motion" KLIK "Login ke Alight Creative". DONE PREMIUM ✅
7. tutorial jika masih belum paham : https://vt.tiktok.com/ZSadM8pQh/`;

            document.getElementById('resText').innerText = tpl;
            document.getElementById('resBox').classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        // Global Copy Function
        window.copyToClipboard = (elementId, colorTheme = 'blue') => {
            const text = document.getElementById(elementId).innerText;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            notify("Data Berhasil Disalin!", colorTheme);
        };

        function notify(msg, type = "blue") {
            const t = document.getElementById('toast');
            t.innerText = msg;
            
            let colorClass = 'bg-white text-black'; // default blue
            if(type === 'red') colorClass = 'bg-red-600 text-white';
            if(type === 'pink') colorClass = 'bg-pink-600 text-white';

            t.className = `fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-full text-[11px] uppercase tracking-widest font-bold shadow-2xl z-50 animate-in slide-in-from-bottom-5 ${colorClass}`;
            
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 2500);
        }
    </script>
</body>
